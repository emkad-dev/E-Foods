name: Deploy

on:
  push:
    branches: [ 'main' ]

jobs:
  deploy:
    name: Deploy to staging/prod
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install deps
        run: npm ci --ignore-scripts

      - name: Deploy Prisma migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
        run: npm run db:migrate:deploy

      - name: Deploy Supabase Edge Functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          npx supabase --version
          supabase login --token "$SUPABASE_ACCESS_TOKEN"
          supabase functions deploy app-rpc payment-verification paystack-webhook public-catalog --project-ref "$SUPABASE_PROJECT_REF" --use-api --yes

      # Web apps are hosted on Cloudflare Pages and deployed by the
      # path-filtered workflows deploy-web-landing.yml (feasty-web),
      # deploy-admin.yml (feasty-admin), and deploy-partner.yml
      # (feasty-partner). Pages' own git-integration CI is not used — its
      # build environment can't fit Metro's heap requirement.

      - name: Notify
        run: echo "Deploy steps finished (check logs for details)."
