name: Deploy partner web (partner.feasty.com.ng)

on:
  push:
    branches: [ 'main' ]
    paths:
      - 'apps/partner/**'
      - 'packages/**'
      - 'package-lock.json'
      - '.github/workflows/deploy-partner.yml'
  workflow_dispatch:

# These EXPO_PUBLIC_* values are client-side and ship inside the built JS
# bundle, so they are not secrets; keeping them here keeps CI builds identical
# to local builds that read the repo-root .env.apps.
env:
  EXPO_PUBLIC_SUPABASE_URL: https://rgfbheorvtolixdcpjhy.supabase.co
  EXPO_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJnZmJoZW9ydnRvbGl4ZGNwamh5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0ODE4MTgsImV4cCI6MjA5MzA1NzgxOH0.gJVihwyRHJTuPKxTKpm3UNIqUs5OiG5xCJK1fqweDzk
  EXPO_PUBLIC_SUPABASE_PROJECT_REF: rgfbheorvtolixdcpjhy
  EXPO_PUBLIC_BACKEND_RPC_URL: https://rgfbheorvtolixdcpjhy.supabase.co/functions/v1/app-rpc
  EXPO_PUBLIC_APP_DOMAIN: feasty.com
  EXPO_PUBLIC_FUNCTIONS_REGION: us-central1
  EXPO_PUBLIC_SENTRY_DSN: https://4a5c3f8b1f0482ab71bec0788114e027@o4511625693102080.ingest.de.sentry.io/4511625718464592

jobs:
  deploy:
    name: Build and deploy apps/partner to Cloudflare Pages (feasty-partner)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install deps
        run: npm ci --ignore-scripts

      - name: Build partner web (expo export)
        run: npm run build:partner

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: 04c8ec7606adc0e0b391c2914fc2e429
          command: pages deploy apps/partner/dist --project-name=feasty-partner --branch=main
